name: release

# Publishes clihome to npm whenever you push a version tag, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
#
# Requires repo secret NPM_TOKEN (npm automation token with publish rights).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Build packages
        run: node npm/build.mjs --version "${GITHUB_REF_NAME#v}"

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          dir="npm/dist/clihome"
          ver=$(node -p "require('./$dir/package.json').version")
          if npm view "clihome@$ver" version >/dev/null 2>&1; then
            echo "✓ clihome@$ver already published; nothing to do"
            exit 0
          fi
          # Retry with backoff in case the registry transiently rejects the publish.
          for attempt in 1 2 3 4 5; do
            if npm publish "$dir" --access public --provenance; then
              echo "✓ published clihome@$ver"
              exit 0
            fi
            echo "publish failed (attempt $attempt/5); backing off…"
            sleep 30
          done
          echo "✗ gave up publishing clihome@$ver"
          exit 1
