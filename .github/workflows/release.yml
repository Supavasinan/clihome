name: release

# Publishes clihome to npm whenever you push a version tag, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
#
# Requires repo secret NPM_TOKEN (npm automation token with publish rights).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Build packages
        run: node npm/build.mjs --version "${GITHUB_REF_NAME#v}"

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/dist/clihome-*/; do
            echo "publishing $dir"
            npm publish "$dir" --access public --provenance
          done

      - name: Publish launcher
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish npm/dist/clihome --access public --provenance
